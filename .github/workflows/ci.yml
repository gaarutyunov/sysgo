name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests with coverage
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out -coverpkg=./... ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt check
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Smoke test generate
        shell: bash
        run: |
          go run ./cmd/sysgo version
          go run ./cmd/sysgo generate -c examples/order/sysgo.yaml --out "${RUNNER_TEMP}/out"

  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
      - name: Scan dependencies
        run: osv-scanner scan source --recursive .

  sysml-pipeline:
    name: SysML → JSON → Generate
    runs-on: ubuntu-latest
    env:
      PILOT_RELEASE: "2026-04"
      KERNEL_VERSION: "0.59.0"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache SysML Pilot kernel
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/sysml
          key: sysml-pilot-${{ env.PILOT_RELEASE }}-${{ env.KERNEL_VERSION }}
      - name: Transform real .sysml to JSON with the Pilot serializer
        run: |
          cp -r examples/order "${RUNNER_TEMP}/ex"
          scripts/sysml2json.sh "${RUNNER_TEMP}/ex/OrderContext.sysml" "${RUNNER_TEMP}/ex/model.json"
      - name: Generate from committed JSON and from freshly transformed JSON
        run: |
          go run ./cmd/sysgo generate -c examples/order/sysgo.yaml --out "${RUNNER_TEMP}/committed"
          go run ./cmd/sysgo generate -c "${RUNNER_TEMP}/ex/sysgo.yaml" --out "${RUNNER_TEMP}/fresh"
      - name: Assert committed JSON is in sync with the .sysml source of truth
        run: diff -r "${RUNNER_TEMP}/committed" "${RUNNER_TEMP}/fresh"
      - name: Build the generated project
        run: |
          cd "${RUNNER_TEMP}/fresh"
          printf 'module github.com/acme/orders\n\ngo 1.25.12\n' > go.mod
          go build ./...

  examples-temporal:
    name: Examples Temporal (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: examples/temporal/go.sum
      - name: Integration test against real Temporal (testcontainers)
        working-directory: examples/temporal
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          go test -tags integration -v -timeout 15m \
            -covermode=atomic -coverprofile=coverage.out \
            -coverpkg=github.com/gaarutyunov/sysgo/examples/temporal/... \
            ./...
      - name: Coverage summary
        working-directory: examples/temporal
        run: go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: examples-temporal-coverage
          path: examples/temporal/coverage.out
          if-no-files-found: error

  examples-temporal-drift:
    name: Examples Temporal (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: examples/temporal/go.sum
      - name: Regenerate the example from the model
        working-directory: examples/temporal
        run: go generate ./...
      - name: Assert committed generated code is sysgo output (no drift)
        run: |
          if [ -n "$(git status --porcelain -- examples/temporal/orders)" ]; then
            echo "::error::examples/temporal/orders is out of sync with 'sysgo gen temporal'."
            echo "Regenerate with 'go generate ./...' in examples/temporal and commit the result."
            git status --porcelain -- examples/temporal/orders
            git diff -- examples/temporal/orders
            exit 1
          fi
          echo "No drift: committed generated code matches sysgo output."

  examples-openapi:
    name: Examples OpenAPI (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: examples/openapi/go.sum
      - name: Integration test against a real API container (testcontainers)
        working-directory: examples/openapi
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          INTEGRATION_COVERDIR: ${{ github.workspace }}/examples/openapi/covdata
        run: |
          mkdir -p "$INTEGRATION_COVERDIR"
          go test -tags integration -v -timeout 20m ./...
      - name: Convert container coverage to a profile
        working-directory: examples/openapi
        run: |
          go tool covdata textfmt -i=covdata -o=coverage.out
          go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: examples-openapi-coverage
          path: examples/openapi/coverage.out
          if-no-files-found: error

  examples-openapi-drift:
    name: Examples OpenAPI (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: examples/openapi/go.sum
      - name: Regenerate the example from the model (sysgo gen openapi --server)
        working-directory: examples/openapi
        run: go generate ./...
      - name: Assert committed generated code is sysgo/oapi-codegen output (no drift)
        run: |
          if [ -n "$(git status --porcelain -- examples/openapi/openapi.yaml examples/openapi/api)" ]; then
            echo "::error::examples/openapi generated code is out of sync with the model."
            echo "Regenerate with 'go generate ./...' in examples/openapi and commit the result."
            git status --porcelain -- examples/openapi/openapi.yaml examples/openapi/api
            git diff -- examples/openapi/openapi.yaml examples/openapi/api
            exit 1
          fi
          echo "No drift: committed openapi.yaml and api/ match sysgo gen openapi output."

  examples-combined:
    name: Examples Combined (build + drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: examples/combined/go.sum
      - name: Build the combined example
        working-directory: examples/combined
        run: go build ./...
      - name: Test the combined example
        working-directory: examples/combined
        run: go test ./...
      - name: Regenerate the DDD core, OpenAPI and Temporal code from the model
        working-directory: examples/combined
        run: go generate ./...
      - name: Assert committed generated code is sysgo/oapi-codegen output (no drift)
        run: |
          paths="examples/combined/internal examples/combined/openapi.yaml examples/combined/api examples/combined/orders"
          if [ -n "$(git status --porcelain -- $paths)" ]; then
            echo "::error::examples/combined generated code is out of sync with the model."
            echo "Regenerate with 'go generate ./...' in examples/combined and commit the result."
            git status --porcelain -- $paths
            git diff -- $paths
            exit 1
          fi
          echo "No drift: committed DDD core, openapi.yaml and api/ match generator output."
