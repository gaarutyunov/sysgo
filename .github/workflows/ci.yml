name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests with coverage
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out -coverpkg=./... ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt check
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: v2.12.2

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Smoke test generate
        shell: bash
        run: |
          go run ./cmd/sysgo version
          go run ./cmd/sysgo generate -c examples/order/sysgo.yaml --out "${RUNNER_TEMP}/out"

  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
      - name: Scan dependencies
        run: osv-scanner scan source --recursive .

  sysml-pipeline:
    name: SysML → JSON → Generate
    runs-on: ubuntu-latest
    env:
      PILOT_RELEASE: "2026-04"
      KERNEL_VERSION: "0.59.0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache SysML Pilot kernel
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/sysml
          key: sysml-pilot-${{ env.PILOT_RELEASE }}-${{ env.KERNEL_VERSION }}
      - name: Transform real .sysml to JSON with the Pilot serializer
        run: |
          cp -r examples/order "${RUNNER_TEMP}/ex"
          scripts/sysml2json.sh "${RUNNER_TEMP}/ex/OrderContext.sysml" "${RUNNER_TEMP}/ex/model.json"
      - name: Generate from committed JSON and from freshly transformed JSON
        run: |
          go run ./cmd/sysgo generate -c examples/order/sysgo.yaml --out "${RUNNER_TEMP}/committed"
          go run ./cmd/sysgo generate -c "${RUNNER_TEMP}/ex/sysgo.yaml" --out "${RUNNER_TEMP}/fresh"
      - name: Assert committed JSON is in sync with the .sysml source of truth
        run: diff -r "${RUNNER_TEMP}/committed" "${RUNNER_TEMP}/fresh"
      - name: Build the generated project
        run: |
          cd "${RUNNER_TEMP}/fresh"
          printf 'module github.com/acme/orders\n\ngo 1.25.12\n' > go.mod
          go build ./...

  examples-temporal:
    name: Examples Temporal (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: examples/temporal/go.sum
      - name: Integration test against real Temporal (testcontainers)
        working-directory: examples/temporal
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: |
          go test -tags integration -v -timeout 15m \
            -covermode=atomic -coverprofile=coverage.out \
            -coverpkg=github.com/gaarutyunov/sysgo/examples/temporal/... \
            ./...
      - name: Coverage summary
        working-directory: examples/temporal
        run: go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: examples-temporal-coverage
          path: examples/temporal/coverage.out
          if-no-files-found: error

  examples-temporal-drift:
    name: Examples Temporal (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: examples/temporal/go.sum
      - name: Regenerate the example from the model
        working-directory: examples/temporal
        run: go generate ./...
      - name: Assert committed generated code is sysgo output (no drift)
        run: |
          if [ -n "$(git status --porcelain -- examples/temporal/orders)" ]; then
            echo "::error::examples/temporal/orders is out of sync with 'sysgo gen temporal'."
            echo "Regenerate with 'go generate ./...' in examples/temporal and commit the result."
            git status --porcelain -- examples/temporal/orders
            git diff -- examples/temporal/orders
            exit 1
          fi
          echo "No drift: committed generated code matches sysgo output."

  examples-openapi:
    name: Examples OpenAPI (integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: examples/openapi/go.sum
      - name: Integration test against a real API container (testcontainers)
        working-directory: examples/openapi
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          INTEGRATION_COVERDIR: ${{ github.workspace }}/examples/openapi/covdata
        run: |
          mkdir -p "$INTEGRATION_COVERDIR"
          go test -tags integration -v -timeout 20m ./...
      - name: Convert container coverage to a profile
        working-directory: examples/openapi
        run: |
          go tool covdata textfmt -i=covdata -o=coverage.out
          go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: examples-openapi-coverage
          path: examples/openapi/coverage.out
          if-no-files-found: error
