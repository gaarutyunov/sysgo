name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25.11"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run tests with coverage
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.out -coverpkg=./... ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: gofmt check
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build
        run: go build ./...
      - name: Smoke test generate
        shell: bash
        run: |
          go run ./cmd/sysgo version
          go run ./cmd/sysgo generate -c examples/order/sysgo.yaml --out "${RUNNER_TEMP}/out"

  osv-scan:
    name: OSV Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install osv-scanner
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest
      - name: Scan dependencies
        run: osv-scanner scan source --recursive .

  sysml-pipeline:
    name: SysML → JSON → Generate
    runs-on: ubuntu-latest
    env:
      PILOT_RELEASE: "2026-04"
      KERNEL_VERSION: "0.59.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache SysML Pilot kernel
        uses: actions/cache@v4
        with:
          path: ~/.cache/sysml
          key: sysml-pilot-${{ env.PILOT_RELEASE }}-${{ env.KERNEL_VERSION }}
      - name: Transform real .sysml to JSON with the Pilot serializer
        run: |
          cp -r examples/order "${RUNNER_TEMP}/ex"
          scripts/sysml2json.sh "${RUNNER_TEMP}/ex/OrderContext.sysml" "${RUNNER_TEMP}/ex/model.json"
      - name: Generate from committed JSON and from freshly transformed JSON
        run: |
          go run ./cmd/sysgo generate -c examples/order/sysgo.yaml --out "${RUNNER_TEMP}/committed"
          go run ./cmd/sysgo generate -c "${RUNNER_TEMP}/ex/sysgo.yaml" --out "${RUNNER_TEMP}/fresh"
      - name: Assert committed JSON is in sync with the .sysml source of truth
        run: diff -r "${RUNNER_TEMP}/committed" "${RUNNER_TEMP}/fresh"
      - name: Build the generated project
        run: |
          cd "${RUNNER_TEMP}/fresh"
          printf 'module github.com/acme/orders\n\ngo 1.25.11\n' > go.mod
          go build ./...
